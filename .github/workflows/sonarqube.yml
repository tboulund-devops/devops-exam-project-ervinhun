name: SonarQube Analysis (.NET)

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # Secure checkout for PRs from forks (required for secrets)
      # ---------------------------------------------------------
      - name: Checkout PR code safely
        uses: actions/checkout@v4
        with:
          # Checkout the HEAD commit of the pull request
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install .NET global tools
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          DOTNET_NOLOGO: true
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # ---------------------------------------------------------
      # SonarQube BEGIN
      # ---------------------------------------------------------
      - name: Start SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"MyDevProject" \
            /d:sonar.host.url="http://sonarqube.setgo.dk:9000" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.coverageReportPaths="coverage-report/SonarQube.xml" \
            /d:sonar.qualitygate.wait="true" \
            /d:sonar.qualitygate.timeout="300"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run unit tests with coverage
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Generate coverage report (ReportGenerator -> SonarQube)
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"SonarQube"

      # ---------------------------------------------------------
      # SonarQube END
      # ---------------------------------------------------------
      - name: Complete SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"