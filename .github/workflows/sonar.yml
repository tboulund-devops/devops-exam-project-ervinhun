name: SonarQube Analysis (Fork)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    env:
      SONAR_URL: http://sonarqube.setgo.dk:9000
      PROJECT_KEY: MyDevProject

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- SETUP DOTNET ----------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install tools
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          DOTNET_NOLOGO: true
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Add tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ---------------- CONNECTIVITY TEST ----------------
      - name: Connectivity test (temporary)
        run: |
          echo "DNS:" && getent hosts sonarqube.setgo.dk || true
          echo "HTTP:" && curl -I --max-time 10 $SONAR_URL || true

      # ---------------- SECRET CHECK ----------------
      - name: Check SECRET presence
        env:
          SONAR_TOKEN: ${{ secrets.SECRET }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SECRET is empty. Add it in THIS REPO (your fork) under Settings > Secrets > Actions."
            exit 1
          fi
          echo "SECRET is set (length ${#SONAR_TOKEN})."

      # ---------------- VALIDATE TOKEN ----------------
      - name: Validate token and project visibility (temporary)
        env:
          SONAR_TOKEN: ${{ secrets.SECRET }}
        run: |
          echo "Validate token:"
          curl -s -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_URL/api/authentication/validate"
          echo
          echo "Project search:"
          curl -s -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_URL/api/projects/search?projects=$PROJECT_KEY"
          echo

      # ---------------- SONAR BEGIN ----------------
      - name: Start SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SECRET }}
        run: |
          dotnet sonarscanner begin \
            /k:"$PROJECT_KEY" \
            /d:sonar.host.url="$SONAR_URL" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.coverageReportPaths="coverage-report/SonarQube.xml"

      # ---------------- BUILD + TEST + COVERAGE ----------------
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test with coverage
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"SonarQube"

      # ---------------- SONAR END ----------------
      - name: Complete SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SECRET }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"